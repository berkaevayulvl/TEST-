<!DOCTYPE html>
<!-- Тема оформления: на элементе <html> скрипт выставляет data-theme="pink" для светло-розовой; без атрибута — светлая тема -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Budget Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ========== Цветовые переменные: светлая тема (по умолчанию) ========== */
:root {
    --bg-page: #eef2f7;
    --bg-card: #ffffff;
    --border-soft: #ccc;
    --border-list: #eee;
    --text-main: #1a1a1a;
    --btn-primary: #4CAF50;
    --btn-primary-hover: #43a047;
}

/* Светло-розовая тема: мягкие оттенки, читаемый контраст */
[data-theme="pink"] {
    --bg-page: #fce4ec;
    --bg-card: #fff8fb;
    --border-soft: #e1bee7;
    --border-list: #f8bbd0;
    --text-main: #4a148c;
    --btn-primary: #ec407a;
    --btn-primary-hover: #d81b60;
}

body {
    font-family: Arial;
    background: var(--bg-page);
    color: var(--text-main);
    padding: 20px;
    transition: background-color 0.35s ease, color 0.35s ease;
}

.container {
    max-width: 900px;
    margin: auto;
    background: var(--bg-card);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid var(--border-soft);
    transition: background-color 0.35s ease, border-color 0.35s ease;
}

h1 {
    text-align: center;
}

.title-input {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.title-input input {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
    background: var(--bg-card);
    color: var(--text-main);
}

.balance {
    text-align: center;
    font-size: 28px;
    margin: 20px 0;
}

.topbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.topbar label {
    font-size: 14px;
    font-weight: 700;
}

.currency-select {
    min-width: 90px;
}

.currency-symbol {
    font-weight: 800;
}

.form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input, select, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border-soft);
    background: var(--bg-card);
    color: var(--text-main);
}

/* Основные кнопки действий (не переключатель темы) */
button:not(.theme-toggle) {
    background: var(--btn-primary);
    color: white;
    border: none;
    cursor: pointer;
    transition: background-color 0.2s ease;
}

button:not(.theme-toggle):hover {
    background: var(--btn-primary-hover);
}

/* Кнопка темы: всегда в углу экрана, отдельный стиль */
.theme-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border-soft);
    background: var(--bg-card);
    color: var(--text-main);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    cursor: pointer;
    font-size: 14px;
    transition: background-color 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
}

.theme-toggle:hover {
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.16);
    transform: translateY(-1px);
}

.list {
    margin-top: 20px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid var(--border-list);
}

.income { color: green; }
.expense { color: red; }

.filters {
    margin-top: 15px;
}

/* ===== Графики ===== */
.charts {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
}

.chart-card {
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 14px;
    background: var(--bg-card);
}

.chart-title {
    margin: 0 0 10px;
    font-size: 16px;
    font-weight: 700;
    text-align: left;
}

canvas {
    margin-top: 30px;
}
</style>
<!-- Применяем сохранённую тему до отрисовки страницы, чтобы не мигала светлая тема -->
<script>
(function () {
    try {
        if (localStorage.getItem("budgetTheme") === "pink") {
            document.documentElement.setAttribute("data-theme", "pink");
        }
    } catch (e) { /* localStorage недоступен — остаётся тема по умолчанию */ }
})();
</script>
</head>

<body>

<div class="container">

<!-- 🔹 Название бюджета -->
<div class="title-input">
    <input type="text" id="budgetName" placeholder="Название бюджета">
    <button onclick="saveName()">Сохранить</button>
</div>

<h1 id="title">💰 Мой бюджет</h1>

<!-- 🔹 Валюта оформления (₽ / $ / €) -->
<div class="topbar">
    <label for="currency">Валюта:</label>
    <select id="currency" class="currency-select" onchange="setCurrencyFromUI()">
        <option value="RUB">₽ RUB</option>
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
    </select>
</div>

<div class="balance">
Баланс: <span id="balance">0</span> <span class="currency-symbol" id="currencySymbol">₽</span>
</div>

<div class="form">
<input type="number" id="amount" placeholder="Сумма">
<input type="text" id="category" placeholder="Категория">
<input type="date" id="date">

<select id="type">
<option value="income">Доход</option>
<option value="expense">Расход</option>
</select>

<button onclick="addTransaction()">Добавить</button>
</div>

<div class="filters">
<select id="filter" onchange="render()">
<option value="all">Все</option>
<option value="income">Доходы</option>
<option value="expense">Расходы</option>
</select>

<button onclick="exportCSV()">📥 Экспорт CSV</button>
</div>

<div class="list" id="list"></div>

<!-- 🔹 Графики: визуализация доходов и расходов -->
<div class="charts">
    <!-- 1) Расходы по категориям -->
    <div class="chart-card">
        <h2 class="chart-title">Расходы по категориям</h2>
        <canvas id="chartExpenses"></canvas>
    </div>

    <!-- 2) Доходы и расходы по месяцам -->
    <div class="chart-card">
        <h2 class="chart-title">Доходы и расходы по месяцам</h2>
        <canvas id="chartMonthly"></canvas>
    </div>

    <!-- 3) Баланс во времени -->
    <div class="chart-card">
        <h2 class="chart-title">Баланс во времени</h2>
        <canvas id="chartBalance"></canvas>
    </div>

    <!-- 4) Прогноз расходов до конца месяца (по аналогичному периоду прошлого месяца) -->
    <div class="chart-card">
        <h2 class="chart-title">Прогноз расходов до конца месяца</h2>
        <canvas id="chartForecast"></canvas>
    </div>
</div>

</div>

<!-- Кнопка переключения темы: position:fixed — правый нижний угол окна (см. класс .theme-toggle в CSS) -->
<button type="button" id="themeToggle" class="theme-toggle" title="Переключить цветовую тему">🌸 Розовая тема</button>

<script>
let transactions = JSON.parse(localStorage.getItem("budget")) || [];
let chartExpenses;
let chartMonthly;
let chartBalance;
let chartForecast;

// 🔹 Тема: светлая (по умолчанию) и светло-розовая (data-theme="pink" на <html>)
const THEME_KEY = "budgetTheme";
const CURRENCY_KEY = "budgetCurrency";
let currency = "RUB";

function currencySymbol() {
    if (currency === "USD") return "$";
    if (currency === "EUR") return "€";
    return "₽";
}

function applyCurrencyToUI() {
    const symbol = currencySymbol();
    const symbolEl = document.getElementById("currencySymbol");
    if (symbolEl) symbolEl.textContent = symbol;

    const sel = document.getElementById("currency");
    if (sel) sel.value = currency;
}

function loadCurrency() {
    try {
        const saved = localStorage.getItem(CURRENCY_KEY);
        if (saved === "USD" || saved === "EUR" || saved === "RUB") currency = saved;
    } catch (e) { /* localStorage недоступен */ }
    applyCurrencyToUI();
}

function setCurrencyFromUI() {
    const sel = document.getElementById("currency");
    if (!sel) return;
    const next = sel.value;
    if (next !== "USD" && next !== "EUR" && next !== "RUB") return;
    currency = next;
    try { localStorage.setItem(CURRENCY_KEY, currency); } catch (e) { /* игнорируем */ }
    applyCurrencyToUI();
    render();
}

function getTheme() {
    return document.documentElement.getAttribute("data-theme") === "pink" ? "pink" : "light";
}

function setTheme(theme) {
    if (theme === "pink") {
        document.documentElement.setAttribute("data-theme", "pink");
    } else {
        document.documentElement.removeAttribute("data-theme");
    }
    try {
        localStorage.setItem(THEME_KEY, theme);
    } catch (e) { /* игнорируем */ }
    updateThemeToggleLabel();
    drawChart();
}

function toggleTheme() {
    setTheme(getTheme() === "pink" ? "light" : "pink");
}

function updateThemeToggleLabel() {
    const btn = document.getElementById("themeToggle");
    if (!btn) return;
    if (getTheme() === "pink") {
        btn.textContent = "☀️ Светлая тема";
        btn.title = "Переключить на светлую тему";
    } else {
        btn.textContent = "🌸 Розовая тема";
        btn.title = "Переключить на светло-розовую тему";
    }
}

function initTheme() {
    try {
        var saved = localStorage.getItem(THEME_KEY);
        if (saved === "pink") {
            document.documentElement.setAttribute("data-theme", "pink");
        } else if (saved === "light") {
            document.documentElement.removeAttribute("data-theme");
        }
    } catch (e) { /* localStorage недоступен */ }
    updateThemeToggleLabel();
    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
}

function chartLegendColor() {
    return getComputedStyle(document.documentElement).getPropertyValue("--text-main").trim() || "#1a1a1a";
}

function chartGridColor() {
    // Лёгкая линия сетки, чтобы работало на обеих темах
    return getTheme() === "pink" ? "rgba(74, 20, 140, 0.18)" : "rgba(26, 26, 26, 0.14)";
}

function chartTooltipBg() {
    return getTheme() === "pink" ? "rgba(255, 248, 251, 0.96)" : "rgba(255, 255, 255, 0.96)";
}

// 🔹 Работа с названием
function saveName() {
    const name = document.getElementById("budgetName").value;
    if (!name) return;

    localStorage.setItem("budgetName", name);
    document.getElementById("title").innerText = "💰 " + name;
}

function loadName() {
    const name = localStorage.getItem("budgetName");
    if (name) {
        document.getElementById("title").innerText = "💰 " + name;
        document.getElementById("budgetName").value = name;
    }
}

// 🔹 Сохранение данных
function save() {
    localStorage.setItem("budget", JSON.stringify(transactions));
}

function addTransaction() {
    const amount = +document.getElementById("amount").value;
    const category = document.getElementById("category").value;
    const type = document.getElementById("type").value;
    const date = document.getElementById("date").value;

    if (!amount || !category || !date) {
        alert("Заполни все поля");
        return;
    }

    transactions.push({
        id: Date.now(),
        amount,
        category,
        type,
        date
    });

    save();
    render();
}

function deleteItem(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
}

function render() {
    const list = document.getElementById("list");
    const filter = document.getElementById("filter").value;

    list.innerHTML = "";

    let income = 0;
    let expense = 0;
    const sym = currencySymbol();

    let filtered = transactions.filter(t => {
        return filter === "all" || t.type === filter;
    });

    filtered.forEach(t => {
        const div = document.createElement("div");
        div.className = "item " + t.type;

        div.innerHTML = `
        <span>${t.date} | ${t.category} | ${t.amount} ${sym}</span>
        <button onclick="deleteItem(${t.id})">X</button>
        `;

        list.appendChild(div);

        if (t.type === "income") income += t.amount;
        else expense += t.amount;
    });

    document.getElementById("balance").innerText = income - expense;
    applyCurrencyToUI();

    drawChart();
}

function drawChart() {
    drawExpensesByCategory();
    drawIncomeExpenseByMonth();
    drawBalanceOverTime();
    drawExpenseForecastToMonthEnd();
}

function drawExpensesByCategory() {
    const ctx = document.getElementById("chartExpenses");
    if (!ctx) return;

    let categories = {};
    transactions
        .filter(t => t.type === "expense")
        .forEach(t => {
            categories[t.category] = (categories[t.category] || 0) + t.amount;
        });

    const labels = Object.keys(categories);
    const data = Object.values(categories);

    if (chartExpenses) chartExpenses.destroy();

    chartExpenses = new Chart(ctx, {
        type: "pie",
        data: {
            labels,
            datasets: [{
                data
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: chartLegendColor() }
                },
                tooltip: {
                    backgroundColor: chartTooltipBg(),
                    titleColor: chartLegendColor(),
                    bodyColor: chartLegendColor(),
                    borderColor: chartGridColor(),
                    borderWidth: 1
                }
            }
        }
    });
}

function monthKey(isoDate) {
    // isoDate: YYYY-MM-DD → YYYY-MM
    return (isoDate || "").slice(0, 7);
}

function drawIncomeExpenseByMonth() {
    const ctx = document.getElementById("chartMonthly");
    if (!ctx) return;

    const byMonth = {};
    transactions.forEach(t => {
        const m = monthKey(t.date);
        if (!m) return;
        if (!byMonth[m]) byMonth[m] = { income: 0, expense: 0 };
        if (t.type === "income") byMonth[m].income += t.amount;
        else if (t.type === "expense") byMonth[m].expense += t.amount;
    });

    const labels = Object.keys(byMonth).sort();
    const incomeData = labels.map(m => byMonth[m].income);
    const expenseData = labels.map(m => byMonth[m].expense);

    if (chartMonthly) chartMonthly.destroy();

    chartMonthly = new Chart(ctx, {
        type: "bar",
        data: {
            labels,
            datasets: [
                {
                    label: "Доходы",
                    data: incomeData,
                    backgroundColor: getTheme() === "pink" ? "rgba(236, 64, 122, 0.75)" : "rgba(76, 175, 80, 0.75)"
                },
                {
                    label: "Расходы",
                    data: expenseData,
                    backgroundColor: getTheme() === "pink" ? "rgba(74, 20, 140, 0.35)" : "rgba(244, 67, 54, 0.55)"
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: chartLegendColor() } },
                tooltip: {
                    backgroundColor: chartTooltipBg(),
                    titleColor: chartLegendColor(),
                    bodyColor: chartLegendColor(),
                    borderColor: chartGridColor(),
                    borderWidth: 1
                }
            },
            scales: {
                x: {
                    ticks: { color: chartLegendColor() },
                    grid: { color: chartGridColor() }
                },
                y: {
                    ticks: { color: chartLegendColor() },
                    grid: { color: chartGridColor() },
                    beginAtZero: true
                }
            }
        }
    });
}

function drawBalanceOverTime() {
    const ctx = document.getElementById("chartBalance");
    if (!ctx) return;

    const sorted = [...transactions].sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.id - b.id));

    let balance = 0;
    const labels = [];
    const data = [];

    sorted.forEach(t => {
        if (!t.date) return;
        balance += (t.type === "income" ? t.amount : -t.amount);
        labels.push(t.date);
        data.push(balance);
    });

    if (chartBalance) chartBalance.destroy();

    chartBalance = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Баланс",
                data,
                borderColor: getTheme() === "pink" ? "rgba(74, 20, 140, 0.9)" : "rgba(33, 150, 243, 0.9)",
                backgroundColor: getTheme() === "pink" ? "rgba(74, 20, 140, 0.12)" : "rgba(33, 150, 243, 0.12)",
                fill: true,
                tension: 0.25,
                pointRadius: 2
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: chartLegendColor() } },
                tooltip: {
                    backgroundColor: chartTooltipBg(),
                    titleColor: chartLegendColor(),
                    bodyColor: chartLegendColor(),
                    borderColor: chartGridColor(),
                    borderWidth: 1
                }
            },
            scales: {
                x: {
                    ticks: { color: chartLegendColor(), maxRotation: 0, autoSkip: true },
                    grid: { color: chartGridColor() }
                },
                y: {
                    ticks: { color: chartLegendColor() },
                    grid: { color: chartGridColor() }
                }
            }
        }
    });
}

function parseISODate(iso) {
    // YYYY-MM-DD → Date (локальное время). Если невалидно — null.
    if (!iso || typeof iso !== "string" || iso.length < 10) return null;
    const y = Number(iso.slice(0, 4));
    const m = Number(iso.slice(5, 7));
    const d = Number(iso.slice(8, 10));
    if (!y || !m || !d) return null;
    return new Date(y, m - 1, d);
}

function ymd(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

function monthStart(date) {
    return new Date(date.getFullYear(), date.getMonth(), 1);
}

function monthEnd(date) {
    return new Date(date.getFullYear(), date.getMonth() + 1, 0);
}

function addDays(date, days) {
    const d = new Date(date);
    d.setDate(d.getDate() + days);
    return d;
}

function shiftMonth(date, deltaMonths) {
    // Сдвиг по месяцам, сохраняя "похожий" день. Для периода 1..N это безопасно.
    return new Date(date.getFullYear(), date.getMonth() + deltaMonths, date.getDate());
}

function sumExpensesBetweenInclusive(start, end) {
    // Суммируем расходы по датам в диапазоне [start, end] (оба включительно).
    const startKey = ymd(start);
    const endKey = ymd(end);
    let total = 0;
    transactions
        .filter(t => t.type === "expense")
        .forEach(t => {
            if (!t.date) return;
            if (t.date >= startKey && t.date <= endKey) total += t.amount;
        });
    return total;
}

function sumExpensesForDay(dayKey) {
    let total = 0;
    transactions
        .filter(t => t.type === "expense" && t.date === dayKey)
        .forEach(t => { total += t.amount; });
    return total;
}

function drawExpenseForecastToMonthEnd() {
    const ctx = document.getElementById("chartForecast");
    if (!ctx) return;

    const today = new Date();
    const currentStart = monthStart(today);
    const currentEnd = monthEnd(today);

    const todayDay = today.getDate();
    const currentDaysInMonth = currentEnd.getDate();

    // Аналогичный период прошлого месяца: с 1-го по N-е число (где N = сегодня)
    const prevMonthSameDay = shiftMonth(today, -1);
    const prevStart = monthStart(prevMonthSameDay);
    const prevEnd = new Date(prevStart.getFullYear(), prevStart.getMonth(), Math.min(todayDay, monthEnd(prevStart).getDate()));

    const actualToDate = sumExpensesBetweenInclusive(currentStart, new Date(today.getFullYear(), today.getMonth(), todayDay));

    const prevPeriodTotal = sumExpensesBetweenInclusive(prevStart, prevEnd);
    const prevPeriodDays = prevEnd.getDate(); // т.к. prevStart = 1 число
    const avgDailyPrev = prevPeriodDays > 0 ? (prevPeriodTotal / prevPeriodDays) : 0;

    // Формируем серии по дням текущего месяца
    const labels = [];
    const actualCumulative = [];
    const forecastCumulative = [];

    let runActual = 0;
    let runForecast = 0;

    for (let day = 1; day <= currentDaysInMonth; day++) {
        const date = new Date(today.getFullYear(), today.getMonth(), day);
        const key = ymd(date);
        labels.push(key.slice(8, 10)); // показываем только день месяца

        if (day <= todayDay) {
            runActual += sumExpensesForDay(key);
            actualCumulative.push(runActual);
            runForecast = runActual; // прогноз стартует от факта
            forecastCumulative.push(runActual);
        } else {
            actualCumulative.push(null); // факта ещё нет
            runForecast += avgDailyPrev;
            forecastCumulative.push(Math.round(runForecast));
        }
    }

    // Если прошлый месяц пустой — прогноз будет равен факту, а дальше линия будет ровная.
    // Это нормально: в этом случае пользователю нужно накопить историю.

    if (chartForecast) chartForecast.destroy();

    chartForecast = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [
                {
                    label: "Факт (накопленно)",
                    data: actualCumulative,
                    borderColor: getTheme() === "pink" ? "rgba(236, 64, 122, 0.95)" : "rgba(244, 67, 54, 0.85)",
                    backgroundColor: getTheme() === "pink" ? "rgba(236, 64, 122, 0.10)" : "rgba(244, 67, 54, 0.10)",
                    fill: true,
                    tension: 0.25,
                    pointRadius: 2,
                    spanGaps: true
                },
                {
                    label: "Прогноз до конца месяца",
                    data: forecastCumulative,
                    borderColor: getTheme() === "pink" ? "rgba(74, 20, 140, 0.85)" : "rgba(33, 150, 243, 0.85)",
                    borderDash: [6, 6],
                    fill: false,
                    tension: 0.25,
                    pointRadius: 0
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: chartLegendColor() } },
                tooltip: {
                    backgroundColor: chartTooltipBg(),
                    titleColor: chartLegendColor(),
                    bodyColor: chartLegendColor(),
                    borderColor: chartGridColor(),
                    borderWidth: 1,
                    callbacks: {
                        title: (items) => {
                            const day = items?.[0]?.label || "";
                            // Пояснение: показываем день месяца
                            return `День ${day}`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    title: { display: true, text: "День месяца", color: chartLegendColor() },
                    ticks: { color: chartLegendColor(), maxRotation: 0, autoSkip: true },
                    grid: { color: chartGridColor() }
                },
                y: {
                    title: { display: true, text: "₽", color: chartLegendColor() },
                    ticks: { color: chartLegendColor() },
                    grid: { color: chartGridColor() },
                    beginAtZero: true
                }
            }
        }
    });
}

function exportCSV() {
    let csv = "Дата,Категория,Тип,Сумма,Валюта\n";

    transactions.forEach(t => {
        csv += `${t.date},${t.category},${t.type},${t.amount},${currency}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "budget.csv";
    a.click();
}

// 🔹 Инициализация
initTheme();
loadCurrency();
loadName();
render();
</script>
